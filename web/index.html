<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocateIt</title>
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="top-bar">
      <div class="brand">
        <img class="brand-logo" src="img/logo-mark.png" width="48" height="48" alt="" aria-hidden="true" />
        <div class="brand-text">
          <h1>LocateIt</h1>
          <p class="tagline">Find where your photos belong</p>
        </div>
      </div>
      <div id="stats" class="stats"></div>
    </header>

    <aside class="sidebar">
      <section id="import-section" class="import-section">
        <button id="restore-session-btn" type="button" class="folder-entry folder-entry-restore" hidden>
          <span class="folder-entry-icon" aria-hidden="true">↩</span>
          <span class="folder-entry-title">Restore album</span>
          <span id="restore-session-hint" class="folder-entry-hint">Reconnect to your last photo folder</span>
        </button>
        <button id="choose-photos-btn" type="button" class="folder-entry folder-entry-inline">
          <span class="folder-entry-icon" aria-hidden="true">📷</span>
          <span class="folder-entry-title">Open album</span>
        </button>
        <p id="browser-warn" class="hint browser-warn" hidden>
          Saving to originals requires Chrome or Edge. Other browsers can only preview on the map.
        </p>
        <input type="file" id="file-picker" webkitdirectory multiple accept="image/*,.heic,.heif,.dng,.cr2,.cr3,.nef,.arw,.orf,.rw2,.pef,.srw,.raf" hidden />
      </section>

      <section id="folder-summary" class="folder-summary" hidden>
        <p id="workspace-hint" class="workspace-hint"></p>
      </section>

      <div id="pending-panel" class="panel pending-panel" hidden>
        <div class="pending-toolbar">
          <button id="select-all-btn" type="button" class="btn btn-sm">Select all</button>
          <button id="clear-selection-btn" type="button" class="btn btn-sm">Clear</button>
          <button id="save-all-btn" type="button" class="btn btn-sm primary">Save</button>
        </div>
        <div id="pending-gallery" class="pending-gallery scroll-subtle"></div>
      </div>

      <p id="status" class="status">Loading…</p>
    </aside>

    <main class="map-wrap">
      <div class="map-search">
        <input
          id="map-search-input"
          type="search"
          placeholder="Search place…"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="map-search-btn" type="button" class="btn primary btn-sm">Go</button>
      </div>
      <ul id="map-search-results" class="map-search-results hidden" role="listbox"></ul>
      <div id="map"></div>
    </main>

    <div id="hover-preview" class="hover-preview hidden" aria-live="polite"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
